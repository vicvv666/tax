services:
  - type: web
    name: taxcalc-pro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PORT
        value: "10000"
      - key: FLASK_DEBUG
        value: "0"
    plan: free
